name: Deploy Android

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: android-production
    env:
      FLAVOR: production
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Validate required secrets
        env:
          ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_SERVICE_ACCOUNT_JSON KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Play service account JSON
        env:
          ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$ANDROID_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/play-service-account.json"
          echo "ANDROID_SERVICE_ACCOUNT_JSON_PATH=$RUNNER_TEMP/play-service-account.json" >> "$GITHUB_ENV"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Build Android app bundle
        run: flutter build appbundle --release --flavor "$FLAVOR" -t "lib/main_${FLAVOR}.dart"

      - name: Verify AAB signature
        run: jarsigner -verify -verbose -certs "build/app/outputs/bundle/${FLAVOR}Release/app-${FLAVOR}-release.aab"

      - name: Generate release notes
        run: |
          chmod +x fastlane/gen_release_notes
          ./fastlane/gen_release_notes

      - name: Deploy with Fastlane
        env:
          ANDROID_AAB_PATH: ${{ github.workspace }}/build/app/outputs/bundle/productionRelease/app-production-release.aab
        run: bundle exec fastlane android a_rel

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-production-release
          path: |
            build/app/outputs/bundle/productionRelease/app-production-release.aab
            fastlane/metadata/android
